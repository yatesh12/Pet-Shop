<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Pets')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>
<main class="container py-5">
    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <span class="badge-soft">Adoption & Sale</span>
            <h1 class="mt-2">Meet pets ready for their next home</h1>
        </div>
    </div>
    <form class="row g-3 mb-4" method="get" th:action="@{/pets}">
        <div class="col-md-4"><input class="form-control" name="search" placeholder="Search breed or pet name" th:value="${search}"></div>
        <div class="col-md-4">
            <select class="form-select" name="category">
                <option value="">All pet categories</option>
                <option th:each="categoryItem : ${categories}" th:value="${categoryItem.slug}" th:text="${categoryItem.name}" th:selected="${selectedCategory == categoryItem.slug}"></option>
            </select>
        </div>
        <div class="col-md-4"><button class="btn btn-brand w-100" type="submit">Search Pets</button></div>
    </form>
    <div class="row g-4">
        <div class="col-md-6 col-xl-3" th:each="pet : ${pets.content}">
            <div class="pet-card p-3 h-100">
                <img class="card-media rounded-4 mb-3" th:src="${pet.imageUrl}" th:alt="${pet.name}">
                <div class="d-flex justify-content-between">
                    <span class="badge bg-light text-dark" th:text="${pet.category.name}"></span>
                    <span class="fw-semibold" th:text="${'$' + pet.price}"></span>
                </div>
                <h5 class="mt-3" th:text="${pet.name}"></h5>
                <p class="text-muted small mb-2" th:text="${pet.breed + ' · ' + pet.ageInMonths + ' months'}"></p>
                <p class="small" th:text="${pet.description}"></p>
                <a class="btn btn-brand w-100" th:href="@{'/pets/' + ${pet.slug}}">View Pet</a>
            </div>
        </div>
    </div>
    <div class="d-flex justify-content-between align-items-center mt-4">
        <a class="btn btn-outline-brand" th:if="${!pets.first}" th:href="@{/pets(page=${pets.page - 1}, search=${search}, category=${selectedCategory})}">Previous</a>
        <span class="text-muted">Page <span th:text="${pets.page + 1}"></span> of <span th:text="${pets.totalPages}"></span></span>
        <a class="btn btn-outline-brand ms-auto" th:if="${!pets.last}" th:href="@{/pets(page=${pets.page + 1}, search=${search}, category=${selectedCategory})}">Next</a>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
