<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${pet.name})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>
<main class="container py-5">
    <div class="row g-4">
        <div class="col-lg-6">
            <div class="section-card p-4">
                <img class="img-fluid rounded-4 w-100" th:src="${pet.imageUrl}" th:alt="${pet.name}">
            </div>
        </div>
        <div class="col-lg-6">
            <div class="section-card p-4">
                <span class="badge-soft" th:text="${pet.category.name}"></span>
                <h1 class="mt-3" th:text="${pet.name}"></h1>
                <p class="text-muted" th:text="${pet.breed + ' · ' + pet.ageInMonths + ' months · ' + pet.gender}"></p>
                <p th:text="${pet.description}"></p>
                <div class="fw-semibold mb-2" th:text="${'$' + pet.price + ' · ' + pet.saleType}"></div>
                <div class="mb-3"><strong>Vaccinations:</strong> <span th:text="${#strings.listJoin(pet.vaccinations, ', ')}"></span></div>
                <form sec:authorize="isAuthenticated()" method="post" th:action="@{'/pets/' + ${pet.slug} + '/wishlist'}" class="mb-4">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="name" th:value="${pet.name}">
                    <input type="hidden" name="imageUrl" th:value="${pet.imageUrl}">
                    <input type="hidden" name="price" th:value="${pet.price}">
                    <button class="btn btn-outline-brand" type="submit">Save to Favorites</button>
                </form>
            </div>
        </div>
    </div>
    <div class="row g-4 mt-1">
        <div class="col-lg-6">
            <div class="section-card p-4">
                <h3>Send an Inquiry</h3>
                <form th:action="@{'/pets/' + ${pet.slug} + '/inquiry'}" method="post" th:object="${inquiryForm}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="petName" th:value="${pet.name}">
                    <input class="form-control mb-3" th:field="*{customerName}" placeholder="Your name">
                    <input class="form-control mb-3" th:field="*{customerEmail}" placeholder="Email">
                    <input class="form-control mb-3" th:field="*{phone}" placeholder="Phone">
                    <textarea class="form-control mb-3" rows="4" th:field="*{message}" placeholder="Ask about temperament, availability, and care routines"></textarea>
                    <button class="btn btn-brand" type="submit">Send Inquiry</button>
                </form>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="section-card p-4">
                <h3>Adoption / Sale Request</h3>
                <form th:action="@{'/pets/' + ${pet.slug} + '/adopt'}" method="post" th:object="${adoptionForm}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="petName" th:value="${pet.name}">
                    <input class="form-control mb-3" th:field="*{customerName}" placeholder="Your name">
                    <input class="form-control mb-3" th:field="*{customerEmail}" placeholder="Email">
                    <input class="form-control mb-3" th:field="*{customerPhone}" placeholder="Phone">
                    <input class="form-control mb-3" th:field="*{homeType}" placeholder="Home type">
                    <input class="form-control mb-3" th:field="*{experienceLevel}" placeholder="Experience level">
                    <textarea class="form-control mb-3" rows="4" th:field="*{notes}" placeholder="Tell us about your routine and what home you can provide"></textarea>
                    <button class="btn btn-brand" type="submit">Submit Request</button>
                </form>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
