<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Shop')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>
<main class="container py-5">
    <div class="row g-4">
        <div class="col-lg-3">
            <div class="section-card p-4 sticky-sidebar">
                <h4>Filter Products</h4>
                <form method="get" th:action="@{/shop}" class="mt-3">
                    <input class="form-control mb-3" type="text" name="search" placeholder="Search products" th:value="${search}">
                    <select class="form-select mb-3" name="category">
                        <option value="">All categories</option>
                        <option th:each="categoryItem : ${categories}" th:value="${categoryItem.slug}" th:text="${categoryItem.name}" th:selected="${selectedCategory == categoryItem.slug}"></option>
                    </select>
                    <input class="form-control mb-3" type="number" step="0.01" name="minPrice" placeholder="Minimum price" th:value="${minPrice}">
                    <input class="form-control mb-3" type="number" step="0.01" name="maxPrice" placeholder="Maximum price" th:value="${maxPrice}">
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" name="available" value="true" th:checked="${available}">
                        <label class="form-check-label">In stock only</label>
                    </div>
                    <button class="btn btn-brand w-100" type="submit">Apply Filters</button>
                </form>
            </div>
        </div>
        <div class="col-lg-9">
            <div class="d-flex justify-content-between align-items-end mb-4">
                <div>
                    <span class="badge-soft">Shop</span>
                    <h1 class="mt-2">Products for daily care and happy play</h1>
                </div>
                <div class="text-muted" th:text="${products.totalElements + ' items'}"></div>
            </div>
            <div class="row g-4">
                <div class="col-md-6 col-xl-4" th:each="product : ${products.content}">
                    <div class="product-card p-3 h-100 d-flex flex-column">
                        <img class="card-media rounded-4 mb-3" th:src="${product.imageUrl}" th:alt="${product.name}">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="badge bg-light text-dark" th:text="${product.category.name}"></span>
                            <span class="fw-semibold" th:text="${'$' + product.price}"></span>
                        </div>
                        <h5 class="mt-3" th:text="${product.name}"></h5>
                        <p class="text-muted small flex-grow-1" th:text="${product.description}"></p>
                        <form sec:authorize="isAuthenticated()" method="post" th:action="@{/shop/cart}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="slug" th:value="${product.slug}">
                            <input type="hidden" name="name" th:value="${product.name}">
                            <input type="hidden" name="imageUrl" th:value="${product.imageUrl}">
                            <input type="hidden" name="price" th:value="${product.price}">
                            <button class="btn btn-brand w-100" type="submit">Add to Cart</button>
                        </form>
                        <a sec:authorize="!isAuthenticated()" class="btn btn-outline-brand w-100" th:href="@{/login}">Sign in to buy</a>
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-between align-items-center mt-4">
                <a class="btn btn-outline-brand" th:if="${!products.first}" th:href="@{/shop(page=${products.page - 1}, search=${search}, category=${selectedCategory}, minPrice=${minPrice}, maxPrice=${maxPrice}, available=${available})}">Previous</a>
                <span class="text-muted">Page <span th:text="${products.page + 1}"></span> of <span th:text="${products.totalPages}"></span></span>
                <a class="btn btn-outline-brand ms-auto" th:if="${!products.last}" th:href="@{/shop(page=${products.page + 1}, search=${search}, category=${selectedCategory}, minPrice=${minPrice}, maxPrice=${maxPrice}, available=${available})}">Next</a>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
