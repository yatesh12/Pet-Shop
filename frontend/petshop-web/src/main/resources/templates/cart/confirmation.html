<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Order Confirmation')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="container py-5">
    <div class="section-card p-5">
        <span class="badge-soft">Order Confirmed</span>
        <h1 class="mt-3">Thank you for your order</h1>
        <p>Your sandbox payment was processed successfully and your confirmation is ready below.</p>
        <div class="row g-4 mt-2">
            <div class="col-md-4"><div class="info-card p-3"><div class="text-muted small">Order ID</div><div class="fw-semibold" th:text="${order.id}"></div></div></div>
            <div class="col-md-4"><div class="info-card p-3"><div class="text-muted small">Payment Ref</div><div class="fw-semibold" th:text="${order.paymentReference}"></div></div></div>
            <div class="col-md-4"><div class="info-card p-3"><div class="text-muted small">Total</div><div class="fw-semibold" th:text="${'$' + order.totalAmount}"></div></div></div>
        </div>
        <div class="table-shell mt-4">
            <table class="table table-striped align-middle">
                <thead><tr><th>Item</th><th>Qty</th><th>Line Total</th></tr></thead>
                <tbody>
                <tr th:each="item : ${order.items}">
                    <td th:text="${item.itemName}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="${'$' + item.lineTotal}"></td>
                </tr>
                </tbody>
            </table>
        </div>
        <a class="btn btn-brand mt-4" th:href="@{/account}">View Account</a>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
