<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Cart')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>
<main class="container py-5">
    <div class="row g-4">
        <div class="col-lg-8">
            <div class="section-card p-4">
                <h1>Your Cart</h1>
                <div th:if="${#lists.isEmpty(cart.items)}" class="text-muted">Your cart is empty.</div>
                <div th:each="item : ${cart.items}" class="d-flex flex-column flex-md-row align-items-md-center gap-3 py-3 border-bottom">
                    <img class="rounded-4" th:src="${item.imageUrl}" th:alt="${item.itemName}" style="width: 110px; height: 90px; object-fit: cover;">
                    <div class="flex-grow-1">
                        <div class="fw-semibold" th:text="${item.itemName}"></div>
                        <div class="text-muted small" th:text="${item.itemType}"></div>
                        <div th:text="${'$' + item.unitPrice}"></div>
                    </div>
                    <form method="post" th:action="@{'/cart/items/' + ${item.id}}" class="d-flex gap-2">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input class="form-control" type="number" min="1" name="quantity" th:value="${item.quantity}" style="width: 90px;">
                        <button class="btn btn-outline-brand" type="submit">Update</button>
                    </form>
                    <form method="post" th:action="@{'/cart/items/' + ${item.id} + '/remove'}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-outline-danger" type="submit">Remove</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="section-card p-4 sticky-sidebar">
                <h4>Order Summary</h4>
                <div class="d-flex justify-content-between mt-3"><span>Items</span><strong th:text="${cart.totalItems}"></strong></div>
                <div class="d-flex justify-content-between"><span>Subtotal</span><strong th:text="${'$' + cart.subtotal}"></strong></div>
                <a class="btn btn-brand w-100 mt-4" th:href="@{/checkout}" th:if="${!#lists.isEmpty(cart.items)}">Proceed to Checkout</a>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
