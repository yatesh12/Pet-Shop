<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Checkout')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="container py-5">
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="section-card p-4">
                <h1>Checkout</h1>
                <form th:action="@{/checkout}" method="post" th:object="${checkoutForm}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="row g-3">
                        <div class="col-md-6"><input class="form-control" th:field="*{customerName}" placeholder="Full name"></div>
                        <div class="col-md-6"><input class="form-control" th:field="*{customerEmail}" placeholder="Email"></div>
                        <div class="col-md-6"><input class="form-control" th:field="*{customerPhone}" placeholder="Phone"></div>
                        <div class="col-md-6"><input class="form-control" th:field="*{promoCode}" placeholder="Promo code"></div>
                        <div class="col-12"><input class="form-control" th:field="*{shippingAddress}" placeholder="Street address"></div>
                        <div class="col-md-4"><input class="form-control" th:field="*{city}" placeholder="City"></div>
                        <div class="col-md-4"><input class="form-control" th:field="*{state}" placeholder="State"></div>
                        <div class="col-md-4"><input class="form-control" th:field="*{postalCode}" placeholder="Postal code"></div>
                        <div class="col-12"><textarea class="form-control" rows="4" th:field="*{notes}" placeholder="Delivery notes"></textarea></div>
                        <div class="col-md-6">
                            <select class="form-select" th:field="*{paymentMethod}">
                                <option value="SANDBOX_CARD">Sandbox Card</option>
                            </select>
                        </div>
                        <div class="col-md-6 d-flex align-items-center">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" th:field="*{agreeToTerms}">
                                <label class="form-check-label">I agree to the checkout terms.</label>
                            </div>
                        </div>
                        <div class="col-12"><button class="btn btn-brand w-100" type="submit">Place Order</button></div>
                    </div>
                </form>
            </div>
        </div>
        <div class="col-lg-5">
            <div class="section-card p-4 sticky-sidebar">
                <h4>Cart Summary</h4>
                <div th:each="item : ${cart.items}" class="d-flex justify-content-between py-2 border-bottom">
                    <span th:text="${item.itemName + ' x' + item.quantity}"></span>
                    <strong th:text="${'$' + item.lineTotal}"></strong>
                </div>
                <div class="d-flex justify-content-between mt-3">
                    <span>Subtotal</span>
                    <strong th:text="${'$' + cart.subtotal}"></strong>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
