<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Account')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>
<main class="container py-5">
    <div class="mesh-panel p-4 p-lg-5">
        <div class="d-flex flex-wrap justify-content-between align-items-start gap-3">
            <div>
                <span class="eyebrow">Account Center</span>
                <h1 class="mt-3">My Account</h1>
                <p class="text-muted mb-0">Profile, saved addresses, orders, wishlist items, and service activity in one place.</p>
            </div>
            <div class="floating-pane px-4 py-3">
                <div class="small text-muted">Signed in as</div>
                <div class="fw-semibold" th:text="${user.firstName + ' ' + user.lastName}"></div>
                <div class="small" th:text="${user.email}"></div>
            </div>
        </div>
        <div class="row g-4 mt-1">
            <div class="col-lg-5">
                <div class="info-card p-4 mb-4">
                    <h4>Profile</h4>
                    <form th:action="@{/account/profile}" method="post" th:object="${profileForm}" data-loading-form>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input class="form-control mb-3" th:field="*{firstName}" placeholder="First name">
                        <input class="form-control mb-3" th:field="*{lastName}" placeholder="Last name">
                        <input class="form-control mb-3" th:field="*{email}" placeholder="Email">
                        <input class="form-control mb-3" th:field="*{phone}" placeholder="Phone">
                        <button class="btn btn-brand" type="submit" data-loading-text="Saving profile...">Save Profile</button>
                    </form>
                </div>
                <div class="info-card p-4">
                    <h4>Address Book</h4>
                    <form th:action="@{/account/address}" method="post" th:object="${addressForm}" data-loading-form>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input class="form-control mb-3" th:field="*{label}" placeholder="Label">
                        <input class="form-control mb-3" th:field="*{lineOne}" placeholder="Line 1">
                        <input class="form-control mb-3" th:field="*{lineTwo}" placeholder="Line 2">
                        <input class="form-control mb-3" th:field="*{city}" placeholder="City">
                        <input class="form-control mb-3" th:field="*{state}" placeholder="State">
                        <input class="form-control mb-3" th:field="*{postalCode}" placeholder="Postal code">
                        <input class="form-control mb-3" th:field="*{country}" placeholder="Country">
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" th:field="*{defaultAddress}">
                            <label class="form-check-label">Set as default</label>
                        </div>
                        <button class="btn btn-brand" type="submit" data-loading-text="Saving address...">Save Address</button>
                    </form>
                    <div class="mt-4" th:each="address : ${addresses}">
                        <div class="border rounded-4 p-3 mb-2 bg-white">
                            <div class="fw-semibold" th:text="${address.label}"></div>
                            <div th:text="${address.lineOne + ', ' + address.city + ', ' + address.state + ' ' + address.postalCode}"></div>
                            <div class="small text-muted" th:text="${address.country}"></div>
                            <span class="status-pill mt-2" th:if="${address.defaultAddress}">Default</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-7">
                <div class="info-card p-4 mb-4">
                    <h4>Order History</h4>
                    <div th:if="${#lists.isEmpty(orders)}" class="text-muted">No orders yet.</div>
                    <div th:each="order : ${orders}" class="border rounded-4 p-3 mb-3">
                        <div class="d-flex justify-content-between"><strong th:text="${'Order #' + order.id}"></strong><span th:text="${order.status}"></span></div>
                        <div class="small text-muted" th:text="${order.paymentReference}"></div>
                        <div th:text="${'$' + order.totalAmount}"></div>
                    </div>
                </div>
                <div class="info-card p-4 mb-4">
                    <h4>Saved Items</h4>
                    <div class="row g-3">
                        <div class="col-md-6" th:each="item : ${wishlist}">
                            <div class="border rounded-4 p-3 h-100">
                                <div class="fw-semibold" th:text="${item.itemName}"></div>
                                <div class="small text-muted" th:text="${item.itemType}"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="info-card p-4">
                    <h4>Service Bookings</h4>
                    <div th:each="booking : ${bookings}" class="border rounded-4 p-3 mb-3">
                        <div class="fw-semibold" th:text="${booking.serviceName}"></div>
                        <div class="small text-muted" th:text="${booking.petName + ' · ' + booking.appointmentDate}"></div>
                        <div th:text="${booking.status}"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
