<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Register')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-xl-10">
            <div class="split-band p-4 p-lg-5">
                <div class="row g-4 align-items-center">
                    <div class="col-lg-5">
                        <span class="eyebrow">Create Your Account</span>
                        <h1 class="display-5 mt-3">Join with a real backend account and keep your orders, wishlist, and requests in sync.</h1>
                        <p class="text-muted">Registration creates the account in the backend identity service so sign in, sign out, and role checks all happen server-side.</p>
                    </div>
                    <div class="col-lg-6 ms-lg-auto">
                        <div class="floating-pane p-4 p-lg-5">
                            <span class="badge-soft">Create Account</span>
                            <h2 class="mt-3">Start your customer profile</h2>
                            <form th:action="@{/register}" method="post" th:object="${registrationForm}" data-loading-form>
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <input class="form-control" th:field="*{firstName}" placeholder="First name">
                                        <div class="form-error" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                                    </div>
                                    <div class="col-md-6">
                                        <input class="form-control" th:field="*{lastName}" placeholder="Last name">
                                        <div class="form-error" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                                    </div>
                                    <div class="col-md-6">
                                        <input class="form-control" th:field="*{email}" placeholder="Email">
                                        <div class="form-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                                    </div>
                                    <div class="col-md-6">
                                        <input class="form-control" th:field="*{phone}" placeholder="Phone">
                                        <div class="form-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                                    </div>
                                    <div class="col-12">
                                        <input class="form-control" type="password" th:field="*{password}" placeholder="Password">
                                        <div class="form-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                                    </div>
                                    <div class="col-12">
                                        <button class="btn btn-brand w-100" type="submit" data-loading-text="Creating account...">Create Account</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
