<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Register')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="section-card p-4 p-lg-5">
                <span class="badge-soft">Create Account</span>
                <h1 class="mt-3">Start your customer profile</h1>
                <form th:action="@{/register}" method="post" th:object="${registrationForm}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="row g-3">
                        <div class="col-md-6"><input class="form-control" th:field="*{firstName}" placeholder="First name"></div>
                        <div class="col-md-6"><input class="form-control" th:field="*{lastName}" placeholder="Last name"></div>
                        <div class="col-md-6"><input class="form-control" th:field="*{email}" placeholder="Email"></div>
                        <div class="col-md-6"><input class="form-control" th:field="*{phone}" placeholder="Phone"></div>
                        <div class="col-12"><input class="form-control" type="password" th:field="*{password}" placeholder="Password"></div>
                        <div class="col-12"><button class="btn btn-brand w-100" type="submit">Create Account</button></div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
