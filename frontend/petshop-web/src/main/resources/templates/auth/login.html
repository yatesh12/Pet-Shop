<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="section-card p-4 p-lg-5">
                <span class="badge-soft">Welcome Back</span>
                <h1 class="mt-3">Sign in to continue</h1>
                <form method="post" th:action="@{/login}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input class="form-control mb-3" type="email" name="username" placeholder="Email">
                    <input class="form-control mb-3" type="password" name="password" placeholder="Password">
                    <button class="btn btn-brand w-100" type="submit">Sign In</button>
                </form>
                <p class="small text-muted mt-3 mb-0">Seeded demo admin: <strong>admin@petshop.local</strong> / <strong>Admin@123</strong></p>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
