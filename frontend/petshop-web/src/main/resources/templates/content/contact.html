<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Contact')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>
<main class="container py-5">
    <div class="row g-4">
        <div class="col-lg-5">
            <div class="section-card p-4 h-100">
                <span class="badge-soft">Contact</span>
                <h1 class="mt-2">Plan a visit or send us a message</h1>
                <p class="mb-2"><strong>Address:</strong> 214 Maple Avenue, Austin, Texas</p>
                <p class="mb-2"><strong>Phone:</strong> +1 555-0100</p>
                <p class="mb-4"><strong>Email:</strong> contact@petshop.local</p>
                <div class="ratio ratio-4x3 rounded-4 overflow-hidden mb-4">
                    <iframe src="https://www.openstreetmap.org/export/embed.html?bbox=-97.75%2C30.25%2C-97.73%2C30.27&amp;layer=mapnik" title="Store map"></iframe>
                </div>
                <div class="info-card p-3">
                    <h5>Store Hours</h5>
                    <p class="mb-1">Mon-Fri: 9:00 AM - 7:00 PM</p>
                    <p class="mb-1">Saturday: 10:00 AM - 6:00 PM</p>
                    <p class="mb-0">Sunday: 11:00 AM - 4:00 PM</p>
                </div>
            </div>
        </div>
        <div class="col-lg-7">
            <div class="section-card p-4">
                <h3>Send a Message</h3>
                <form th:action="@{/contact}" method="post" th:object="${contactForm}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="row g-3">
                        <div class="col-md-6"><input class="form-control" th:field="*{name}" placeholder="Name"></div>
                        <div class="col-md-6"><input class="form-control" th:field="*{email}" placeholder="Email"></div>
                        <div class="col-md-6"><input class="form-control" th:field="*{subject}" placeholder="Subject"></div>
                        <div class="col-md-6">
                            <select class="form-select" th:field="*{type}">
                                <option value="CONTACT">General Contact</option>
                                <option value="NEWSLETTER">Newsletter Signup</option>
                            </select>
                        </div>
                        <div class="col-12"><textarea class="form-control" rows="6" th:field="*{message}" placeholder="How can we help?"></textarea></div>
                        <div class="col-12"><button class="btn btn-brand" type="submit">Send Message</button></div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
