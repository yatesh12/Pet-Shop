<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('FAQ')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="container py-5">
    <div class="section-card p-4 p-lg-5">
        <span class="badge-soft">FAQ</span>
        <h1 class="mt-2">Answers to common customer questions</h1>
        <input class="form-control my-4" type="search" placeholder="Search the FAQ" th:value="${search}" data-faq-search>
        <div class="accordion" id="faqAccordion">
            <div class="accordion-item faq-item" data-faq-item th:each="item, iter : ${faqItems}">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" th:attr="data-bs-target='#faq-' + ${iter.index}" th:text="${item.question}"></button>
                </h2>
                <div class="accordion-collapse collapse" th:id="${'faq-' + iter.index}" data-bs-parent="#faqAccordion">
                    <div class="accordion-body">
                        <span class="badge bg-light text-dark mb-2" th:text="${item.category}"></span>
                        <p class="mb-0" th:text="${item.answer}"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
