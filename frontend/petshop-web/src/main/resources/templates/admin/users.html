<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Admin Users')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>
<main class="container py-5">
    <div class="row g-4">
        <div class="col-lg-3" th:replace="~{fragments/layout :: adminSidebar}"></div>
        <div class="col-lg-9">
            <div class="section-card p-4">
                <h1>User Management</h1>
                <div class="table-shell mt-4">
                    <table class="table table-striped align-middle">
                        <thead><tr><th>Name</th><th>Email</th><th>Current Role</th><th>Change Role</th></tr></thead>
                        <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.firstName + ' ' + user.lastName}"></td>
                            <td th:text="${user.email}"></td>
                            <td th:text="${#strings.listJoin(user.roles.![name], ', ')}"></td>
                            <td>
                                <form th:action="@{'/admin/users/' + ${user.id} + '/role'}" method="post" class="d-flex gap-2">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <select class="form-select" name="roleName">
                                        <option value="ROLE_CUSTOMER">Customer</option>
                                        <option value="ROLE_MANAGER">Manager</option>
                                        <option value="ROLE_ADMIN">Admin</option>
                                    </select>
                                    <button class="btn btn-brand" type="submit">Save</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
