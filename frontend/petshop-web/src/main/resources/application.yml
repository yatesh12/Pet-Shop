server:
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  application:
    name: petshop-web
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/petshop?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
  thymeleaf:
    cache: ${THYMELEAF_CACHE:false}

petshop:
  backend-base-url: ${PETSHOP_BACKEND_BASE_URL:${PETSHOP_SERVICES_CATALOG_BASE_URL:http://localhost:8081}}

management:
  endpoints:
    web:
      exposure:
        include: health,info
